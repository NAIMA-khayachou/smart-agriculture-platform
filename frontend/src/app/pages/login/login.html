<!-- login.component.html -->
<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo / Titre -->
    <div class="login-header">
      <div class="logo">
      <!-- Angular : le chemin part de /src/assets/ -->
         <img src="/assets/login.png"  class="logo-img" />
      
      </div>
      <h1 class="page-title">Connexion</h1>
      <p class="page-subtitle">Bienvenue, veuillez vous connecter</p>
    </div>

    <!-- Onglets Admin / Agriculture -->
    <div class="tab-group">
      <button
        class="tab-btn"
        [class.active]="activeTab === 'admin'"
        (click)="setTab('admin')"
        type="button">
        <!-- Icône bouclier (Shield) -->
        <svg class="tab-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Admin
      </button>
      <button
        class="tab-btn"
        [class.active]="activeTab === 'agriculture'"
        (click)="setTab('agriculture')"
        type="button">
        <!-- Icône feuille (Leaf) -->
        <svg class="tab-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
          <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
        </svg>
        Agriculture
      </button>
    </div>

    <!-- Formulaire -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">Adresse e-mail</label>
        <div class="input-wrapper" [class.invalid]="isFieldInvalid('email')">
          <!-- Icône enveloppe (Mail) -->
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <input
            id="email"
            type="email"
            class="form-input"
            formControlName="email"
            [placeholder]="activeTab === 'admin' ? 'admin@agroplatform.ma' : 'agriculteur@agroplatform.ma'"
            autocomplete="email" />
        </div>
        <span class="error-msg" *ngIf="isFieldInvalid('email')">
          <!-- Icône avertissement (AlertCircle) -->
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2px; margin-right:4px">
            <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
          </svg>
          Veuillez entrer un e-mail valide.
        </span>
      </div>

      <!-- Mot de passe -->
      <div class="form-group">
        <div class="label-row">
          <label class="form-label" for="password">Mot de passe</label>
          <a href="#" class="forgot-link">Mot de passe oublié ?</a>
        </div>
        <div class="input-wrapper" [class.invalid]="isFieldInvalid('password')">
          <!-- Icône cadenas (Lock) -->
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            class="form-input"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password" />
          <button type="button" class="eye-btn" (click)="togglePassword()" [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'">
            <!-- Icône œil ouvert (Eye) -->
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Icône œil barré (EyeOff) -->
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
              <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
              <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
              <line x1="2" x2="22" y1="2" y2="22"/>
            </svg>
          </button>
        </div>
        <span class="error-msg" *ngIf="isFieldInvalid('password')">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2px; margin-right:4px">
            <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
          </svg>
          Le mot de passe est requis.
        </span>
      </div>

      <!-- Se souvenir de moi -->
      <div class="remember-row">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="rememberMe" />
          Se souvenir de moi
        </label>
      </div>

      <!-- Message d'erreur global -->
      <div class="alert-error" *ngIf="loginError">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2px; margin-right:6px">
          <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
        </svg>
        {{ loginError }}
      </div>

      <!-- Bouton de connexion -->
      <button
        type="submit"
        class="submit-btn"
        [disabled]="isLoading">
        <span *ngIf="!isLoading" class="btn-content">
          <!-- Icône flèche droite (ArrowRight) -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
          Se connecter
        </span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

    </form>
  </div>
</div>
